<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprobante de Pago Exitoso</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .success-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .success-icon {
            color: #28a745;
            font-size: 80px;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        h1 {
            color: #333;
            margin: 0 0 10px;
            font-size: 24px;
        }
        p {
            color: #666;
            margin: 0 0 20px;
        }
        .details {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
            font-weight: bold;
            border-top: 1px solid #eee;
            padding-top: 8px;
            margin-top: 8px;
        }
        .btn {
            background-color: #003366;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #002244;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>¡Pago Exitoso!</h1>
        <p>Tu transacción ha sido procesada correctamente.</p>
        
        <div class="details">
            <div class="detail-row">
                <span>Referencia:</span>
                <span id="ref">...</span>
            </div>
            <div class="detail-row">
                <span>Banco:</span>
                <span id="bank">...</span>
            </div>
            <div class="detail-row">
                <span>Fecha:</span>
                <span id="date">...</span>
            </div>
            <div class="detail-row">
                <span>Total Pagado:</span>
                <span id="val">$0</span>
            </div>
        </div>

        <a href="index.html" class="btn">Volver al Inicio</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('ref').innerText = urlParams.get('ref') || 'N/A';
        document.getElementById('val').innerText = '$' + parseInt(urlParams.get('val') || '0').toLocaleString();
        document.getElementById('bank').innerText = urlParams.get('bank') || 'Banco';
        
        const now = new Date();
        document.getElementById('date').innerText = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
    </script>
</body>
</html>
